<!DOCTYPE html>
<html lang="fr" data-theme="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LinguaRío — FR ↔ Espagnol Argentin</title>
  <meta name="description" content="Apprends le français ou l'espagnol argentin — leçons, exercices et révisions SRS." />
  <meta name="theme-color" content="#06060f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

<div id="toast" class="toast"></div>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<header class="app-header">
  <span class="app-logo">🌊</span>
  <span class="app-name">LinguaRío</span>
  <button id="sync-btn" class="sync-btn" title="Se connecter avec Google pour sauvegarder">☁</button>
</header>

<!-- ── Navigation ───────────────────────────────────────────────────── -->
<nav id="sidenav">
  <button class="snav-tab active" data-screen="home">
    <span class="snav-icon">▶</span>
    <span class="snav-label">Apprendre</span>
  </button>
  <button class="snav-tab" data-screen="parcours">
    <span class="snav-icon">🗺️</span>
    <span class="snav-label">Parcours</span>
  </button>
  <button class="snav-tab" data-screen="duel">
    <span class="snav-icon">⚔️</span>
    <span class="snav-label">Duel</span>
  </button>
</nav>

<!-- ── Main content ─────────────────────────────────────────────────── -->
<main id="app-main">

  <!-- BIENVENUE ──────────────────────────────────────────────────── -->
  <section id="screen-welcome" class="screen active">
    <div class="wc-wrap">
      <div class="wc-logo">🌊</div>
      <div class="wc-title">LinguaRío</div>
      <div class="wc-sub">Français ↔ Espagnol argentin</div>

      <div class="wc-cards">
        <div class="wc-card selected" data-mode="fr-es">
          <div class="wc-flag">🇫🇷→🇦🇷</div>
          <div class="wc-lang">J'apprends l'espagnol</div>
        </div>
        <div class="wc-card" data-mode="es-fr">
          <div class="wc-flag">🇦🇷→🇫🇷</div>
          <div class="wc-lang">Aprendo francés</div>
        </div>
      </div>

      <input class="wc-name" type="text" id="welcome-name" placeholder="Ton prénom (optionnel)" maxlength="30" />
      <button class="wc-start-btn" id="welcome-start">Commencer ▶</button>
    </div>
  </section>

  <!-- ACCUEIL ────────────────────────────────────────────────────── -->
  <section id="screen-home" class="screen"></section>

  <!-- DUEL ──────────────────────────────────────────────────────── -->
  <section id="screen-duel" class="screen"></section>

  <!-- PARCOURS B1 ─────────────────────────────────────────────────── -->
  <section id="screen-parcours" class="screen"></section>

  <!-- SESSION RAPIDE / LEÇON ─────────────────────────────────────── -->
  <section id="screen-quick-session" class="screen"></section>

</main>

<!-- ── Firebase SDK (compat) — chargé avant sync.js ────────────────── -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- ── Scripts (order critical) ────────────────────────────────────── -->
<script src="js/storage.js"></script>
<script src="js/srs.js"></script>
<script src="js/i18n.js"></script>
<script src="data/verbs.js"></script>
<script src="data/curriculum-b1.js"></script>
<script src="data/curriculum-b1-es.js"></script>
<script src="js/xp.js"></script>
<script src="js/audio.js"></script>
<script src="js/duel.js"></script>
<script src="js/quick-session.js"></script>
<script src="js/parcours.js"></script>
<script src="js/lesson-engine.js"></script>
<script src="js/lesson.js"></script>
<script src="js/app.js"></script>
<script src="js/sync.js"></script>

<script>
  /* ── Firebase config ───────────────────────────────────────────────
     1. Va sur https://console.firebase.google.com
     2. Crée un projet → Ajoute une app Web
     3. Active Authentication > Google
     4. Active Firestore Database (mode production)
     5. Remplace les valeurs ci-dessous par ton config
  ──────────────────────────────────────────────────────────────────── */
  const FIREBASE_CONFIG = {
    apiKey:            'AIzaSyD9yec2L6B9cQElS-hHA8QbkBFI7IB7wjk',
    authDomain:        'linguario-21399.firebaseapp.com',
    projectId:         'linguario-21399',
    storageBucket:     'linguario-21399.firebasestorage.app',
    messagingSenderId: '535044348237',
    appId:             '1:535044348237:web:be03ca119dde507f877f04'
  };

  if (FIREBASE_CONFIG.apiKey !== 'REMPLACE_MOI') {
    Sync.init(FIREBASE_CONFIG);
  }

  document.getElementById('sync-btn').addEventListener('click', () => {
    if (window.Sync && Sync.getUser()) Sync.signOut();
    else if (window.Sync) Sync.signIn();
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
